<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620"><rect width="100%" height="100%" fill="#06111f"/><rect x="40" y="40" width="1320" height="540" rx="28" fill="#0b2138" stroke="#39d9ff" stroke-opacity=".35"/><text x="80" y="105" fill="#6df7b4" font-family="Consolas, monospace" font-size="34" font-weight="700">crypto.js / app.js — AES Encryption Routine</text><text x="90" y="170" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Purpose</text><text x="120" y="215" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">Encrypt collected credentials and keystrokes before exfiltration.</text><text x="90" y="285" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Observed routine</text><text x="120" y="335" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">const key = CryptoJS.enc.Utf8.parse('SuperSecretKey123');</text><text x="120" y="375" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">const iv = CryptoJS.lib.WordArray.random(16);</text><text x="120" y="415" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">CryptoJS.AES.encrypt(data, key, { iv: iv });</text><text x="120" y="455" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">return iv.concat(encrypted.ciphertext).toString(Base64);</text><rect x="80" y="505" width="1180" height="44" rx="12" fill="#102f4d"/><text x="105" y="535" fill="#ffe07a" font-family="Inter, Arial" font-size="22">Algorithm: AES • Library: CryptoJS • Output: Base64 encoded IV + ciphertext.</text></svg>