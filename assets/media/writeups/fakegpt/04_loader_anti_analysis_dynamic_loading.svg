<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="100%" height="100%" fill="#06111f"/><rect x="40" y="40" width="1320" height="680" rx="28" fill="#0b2138" stroke="#39d9ff" stroke-opacity=".35"/><text x="80" y="105" fill="#6df7b4" font-family="Consolas, monospace" font-size="34" font-weight="700">loader.js — Anti-analysis and Dynamic Loading</text><text x="90" y="165" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Anti-analysis check</text><text x="120" y="215" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">if (navigator.plugins.length === 0 ||</text><text x="120" y="255" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">    /HeadlessChrome/.test(navigator.userAgent)) {</text><text x="150" y="295" fill="#ffe07a" font-family="Consolas, monospace" font-size="25">alert("Virtual environment detected. Extension will disable itself.");</text><text x="120" y="335" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">}</text><text x="90" y="410" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Dynamic script loading</text><text x="120" y="460" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">script = document.createElement('script');</text><text x="120" y="500" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">script.src = url;</text><text x="120" y="540" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">document.head.appendChild(script);</text><text x="120" y="600" fill="#6df7b4" font-family="Consolas, monospace" font-size="25">loadScript('core/app.js', ...)</text><rect x="80" y="650" width="1180" height="44" rx="12" fill="#102f4d"/><text x="105" y="680" fill="#94b8c7" font-family="Inter, Arial" font-size="22">First trigger: navigator.plugins.length === 0. Secondary check: HeadlessChrome User-Agent.</text></svg>