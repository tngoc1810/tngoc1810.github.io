<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect width="100%" height="100%" fill="#06111f"/><rect x="40" y="40" width="1320" height="680" rx="28" fill="#0b2138" stroke="#39d9ff" stroke-opacity=".35"/><text x="80" y="105" fill="#6df7b4" font-family="Consolas, monospace" font-size="34" font-weight="700">manifest.json — Permissions and Entry Points</text><text x="80" y="165" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Extension metadata</text><text x="110" y="212" fill="#d9f6ff" font-family="Consolas, monospace" font-size="26">name: ChatGPT</text><text x="110" y="252" fill="#d9f6ff" font-family="Consolas, monospace" font-size="26">version: 1.0</text><text x="110" y="292" fill="#d9f6ff" font-family="Consolas, monospace" font-size="26">description: An AI-powered assistant extension</text><text x="80" y="355" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Suspicious permissions</text><text x="110" y="402" fill="#d9f6ff" font-family="Consolas, monospace" font-size="26">tabs, storage, webRequest, webRequestBlocking, cookies</text><text x="110" y="442" fill="#d9f6ff" font-family="Consolas, monospace" font-size="26">http://*/* and https://*/*</text><text x="80" y="505" fill="#39d9ff" font-family="Consolas, monospace" font-size="28">Execution entry points</text><text x="110" y="552" fill="#d9f6ff" font-family="Consolas, monospace" font-size="26">background script: system/loader.js</text><text x="110" y="592" fill="#d9f6ff" font-family="Consolas, monospace" font-size="26">content script: core/app.js</text><text x="110" y="632" fill="#d9f6ff" font-family="Consolas, monospace" font-size="26">matches: &lt;all_urls&gt;</text><rect x="80" y="662" width="1180" height="40" rx="12" fill="#102f4d"/><text x="105" y="690" fill="#ffe07a" font-family="Inter, Arial" font-size="22">Key point: broad host access plus cookies is suspicious for a simple AI helper extension.</text></svg>